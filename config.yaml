# MirBot 配置文件
game:
  window_title: "圣山传说三区"

player:
  hp_threshold: 0.5
  mp_threshold: 0.3
  potion_min_count: 5

skills:
  attack_single: "F1"
  attack_aoe: "F2"
  shield: "F3"
  summon: "F4"
  boss_skill: "F5"

leveling:
  mode: "fire"
  patrol_points: []
  loot_enabled: true
  loot_filter: []
  monster_names: []   # 怪物白名单，为空则识别所有文字

pet:
  pull_count: 3
  safe_distance: 200
  grid_pixels: 48        # 1格对应的像素数，用于距离计算

screen:
  hp_bar_region: [10, 40, 160, 52]
  mp_bar_region: [10, 56, 160, 68]
  hp_text_region: [22, 1010, 62, 18]    # "211/211" 文字区域 [x, y, 宽, 高]
  mp_text_region: [84, 1010, 62, 18]   # "814/816" 文字区域 [x, y, 宽, 高]
  game_area: [0, 0, 800, 600]
  coord_text_region: [122, 1032, 40, 23]  # 坐标文字区域 [x, y, 宽, 高]，需要用户自行填写

colors:
  hp_red: [180, 0, 0]
  hp_red_max: [255, 80, 80]
  mp_blue: [0, 0, 180]
  mp_blue_max: [80, 80, 255]

minimap:
  region: [1230, 30, 160, 180]
  white_threshold: 240
  black_threshold: 15
  arrival_radius: 5

patrol:
  waypoints: []
